<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- Magnifying glass circle -->
  <circle cx="280" cy="220" r="120" stroke="#06b6d4" stroke-width="24" fill="none" opacity="0.3"/>
  <circle cx="280" cy="220" r="120" stroke="#22d3ee" stroke-width="16" fill="none"/>
  <!-- Glow effect -->
  <circle cx="280" cy="220" r="130" stroke="#06b6d4" stroke-width="4" fill="none" opacity="0.4"/>
  <!-- Handle -->
  <line x1="190" y1="310" x2="110" y2="390" stroke="#334155" stroke-width="32" stroke-linecap="round"/>
  <line x1="190" y1="310" x2="110" y2="390" stroke="#475569" stroke-width="24" stroke-linecap="round"/>
  <!-- Browser tab inside lens -->
  <rect x="230" y="175" width="100" height="75" rx="8" fill="none" stroke="#22d3ee" stroke-width="6"/>
  <line x1="230" y1="195" x2="330" y2="195" stroke="#22d3ee" stroke-width="4"/>
  <!-- Small dots for browser chrome -->
  <circle cx="244" cy="185" r="4" fill="#06b6d4"/>
  <circle cx="256" cy="185" r="4" fill="#06b6d4"/>
  <circle cx="268" cy="185" r="4" fill="#06b6d4"/>
  <!-- Favicon icon shape inside browser -->
  <rect x="265" y="210" width="24" height="24" rx="4" fill="#06b6d4" opacity="0.6"/>
</svg>
